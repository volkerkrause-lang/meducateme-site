      const isAdmin = user && user.role === "admin";

      const handlePublish = () => {
        if (!draftText.trim() || !formState.title.trim()) return;
        onPublish({
          ...formState,
          text: draftText.trim(),
        });
        setDraftText("");
        setFormState({
          title: "",
          level: "Intermediate",
          category: "Paediatrics",
          premium: true,
        });
        setIsModalOpen(true);
      };

      return (
        <section id="dashboard" className="py-12 md:py-16">
          <div className="mx-auto max-w-6xl px-4">
            <div className="flex flex-col md:flex-row md:items-end gap-6 mb-8">
              <div className="flex-1">
                <p className="text-[11px] uppercase tracking-[0.22em] text-emerald-200 mb-2">
                  Admin dashboard
                </p>
                <h2 className="text-xl md:text-2xl font-semibold text-slate-50 mb-2">
                  Ship new illness explainers in minutes, not weeks.
                </h2>
                <p className="text-sm text-slate-300 max-w-xl">
                  Paste your teaching notes, clinical cases, or physiology threads,
                  choose free vs premium, and publish instantly to the homepage
                  behind the paywall. Designed for busy clinicians.
                </p>
              </div>
              <div className="text-xs text-slate-300 flex flex-col gap-1">
                <span>
                  • Real-time validation on title, category, and level
                </span>
                <span>• Preview new content before pushing live</span>
                <span>• Retro SaaS dashboard styling for clarity</span>
              </div>
            </div>

            <div className="grid md:grid-cols-2 gap-6">
              <div className="rounded-2xl border border-slate-800/70 bg-slate-950/80 backdrop-blur-xl p-4 flex flex-col gap-3">
                <div className="flex items-center justify-between">
                  <span className="text-[11px] uppercase tracking-[0.2em] text-sky-200">
                    Composer
                  </span>
                  <span className="text-[11px] text-slate-400">
                    Status: {isAdmin ? "Admin logged in" : "Read-only"}
                  </span>
                </div>

                <div className="flex flex-col gap-3 text-[11px]">
                  <div className="flex gap-2">
                    <input
                      value={formState.title}
                      onChange={(e) =>
                        setFormState((f) => ({
                          ...f,
                          title: e.target.value,
                        }))
                      }
                      placeholder="Title (e.g., 'DKA in Children: Osmolality & Osmotic Shifts')"
                      className="flex-1 rounded-lg border border-slate-800/80 bg-slate-950/80 px-3 py-2 text-slate-100 placeholder:text-slate-600 focus:outline-none focus:border-emerald-400/70"
                    />
                    <select
                      value={formState.level}
                      onChange={(e) =>
                        setFormState((f) => ({
                          ...f,
                          level: e.target.value,
                        }))
                      }
                      className="w-32 rounded-lg border border-slate-800/80 bg-slate-950/80 px-2 py-2 text-slate-100 focus:outline-none focus:border-emerald-400/70"
                    >
                      <option>Beginner</option>
                      <option>Intermediate</option>
                      <option>Advanced</option>
                    </select>
                  </div>
                  <div className="flex gap-2">
                    <select
                      value={formState.category}
                      onChange={(e) =>
                        setFormState((f) => ({
                          ...f,
                          category: e.target.value,
                        }))
                      }
                      className="w-40 rounded-lg border border-slate-800/80 bg-slate-950/80 px-2 py-2 text-slate-100 focus:outline-none focus:border-emerald-400/70"
                    >
                      <option>Paediatrics</option>
                      <option>Physiology</option>
                      <option>Acute Care</option>
                      <option>Neonates</option>
                    </select>
                    <label className="flex items-center gap-2 text-slate-200">
                      <input
                        type="checkbox"
                        checked={formState.premium}
                        onChange={(e) =>
                          setFormState((f) => ({
                            ...f,
                            premium: e.target.checked,
                          }))
                        }
                        className="rounded border-slate-700/80 bg-slate-950/80"
                      />
                      Premium (behind paywall)
                    </label>
                  </div>
                  <textarea
                    value={draftText}
                    onChange={(e) => setDraftText(e.target.value)}
                    placeholder="Paste your notes, illness explanation, or physiology thread here..."
                    className="min-h-[150px] rounded-lg border border-slate-800/80 bg-slate-950/80 px-3 py-2 text-slate-100 placeholder:text-slate-600 focus:outline-none focus:border-emerald-400/70 resize-y"
                  />
                  <div className="flex items-center justify-between">
                    <span className="text-slate-500">
                      {draftText.length} characters • Autosave simulated
                    </span>
                    <button
                      disabled={!isAdmin}
                      onClick={handlePublish}
                      className={
                        "px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide " +
                        (isAdmin
                          ? "bg-gradient-to-r from-emerald-400 to-sky-400 text-slate-950 shadow-lg shadow-emerald-500/40 hover:scale-[1.02] transition-transform"
                          : "bg-slate-800 text-slate-500 cursor-not-allowed")
                      }
                    >
                      Publish to homepage
                    </button>
                  </div>
                </div>
              </div>

              <div className="rounded-2xl border border-slate-800/70 bg-slate-950/80 backdrop-blur-xl p-4 flex flex-col gap-4">
                <div className="flex items-center justify-between text-[11px]">
                  <span className="uppercase tracking-[0.2em] text-emerald-200">
                    Live preview
                  </span>
                  <span className="text-slate-400">
                    Latest published entries: {publishedContent.length}
                  </span>
                </div>
                <div className="space-y-3 text-[11px]">
                  {publishedContent.length === 0 && (
                    <p className="text-slate-400">
                      Once you publish, new lessons appear here and on the
                      premium homepage stream.
                    </p>
                  )}
                  {publishedContent.map((item, idx) => (
                    <div
                      key={idx}
                      className="rounded-lg border border-slate-800/80 bg-slate-950/80 p-3"
                    >
                      <div className="flex items-center justify-between mb-1">
                        <div>
                          <p className="text-slate-100 font-semibold">
                            {item.title}
                          </p>
                          <p className="text-slate-400">
                            {item.category} • {item.level}
                          </p>
                        </div>
                        <span
                          className={
                            item.premium
                              ? "text-amber-300 text-[10px]"
                              : "text-emerald-300 text-[10px]"
                          }
                        >
                          {item.premium ? "Premium" : "Free"}
                        </span>
                      </div>
                      <p className="text-slate-300 line-clamp-3 whitespace-pre-wrap">
                        {item.text}
                      </p>
                    </div>
                  ))}
                </div>
                <VideoPlayerCard />
              </div>
            </div>

            <AnimatePresence>
              {isModalOpen && (
                <motion.div
                  initial={{ opacity: 0 }}
                  animate={{ opacity: 1 }}
                  exit={{ opacity: 0 }}
                  className="fixed inset-0 z-50 bg-slate-950/70 flex items-center justify-center px-4"
                >
                  <motion.div
                    initial={{ opacity: 0, scale: 0.9, y: 10 }}
                    animate={{ opacity: 1, scale: 1, y: 0 }}
                    exit={{ opacity: 0, scale: 0.9, y: 10 }}
                    className="max-w-md w-full rounded-2xl border border-emerald-400/70 bg-slate-950/90 backdrop-blur-xl p-4 space-y-3"
                  >
                    <div className="flex items-center justify-between">
                      <h3 className="text-sm font-semibold text-emerald-100">
                        Lesson published
                      </h3>
                      <button
                        onClick={() => setIsModalOpen(false)}
                        className="text-[12px] text-slate-400"
                      >
                        ✕
                      </button>
                    </div>
                    <p className="text-xs text-slate-300">
                      Your new teaching content is now visible on the homepage
                      stream for subscribed users. You can edit or unpublish it
                      from the dashboard in a future release.
                    </p>
                    <button
                      onClick={() => setIsModalOpen(false)}
                      className="text-xs font-semibold tracking-wide text-slate-950 bg-emerald-400 rounded-full px-4 py-1.5"
                    >
                      Back to dashboard
                    </button>
                  </motion.div>
                </motion.div>
              )}
            </AnimatePresence>
          </div>
        </section>
      );
    };

    const App = () => {
      const { user, login, logout } = useAuth();
      const [lessons, setLessons] = useState(initialLessons);
      const [search, setSearch] = useState("");
      const [category, setCategory] = useState("All");
      const [level, setLevel] = useState("All");
      const [bookmarks, setBookmarks] = useState([]);
      const [publishedContent, setPublishedContent] = useState([]);

      const handleScrollToSection = (id) => {
        const el = document.getElementById(id);
        if (el) {
          const y =
            el.getBoundingClientRect().top + window.scrollY - 70;
          window.scrollTo({ top: y, behavior: "smooth" });
        }
      };

      const toggleBookmark = (id) => {
        setBookmarks((prev) =>
          prev.includes(id)
            ? prev.filter((b) => b !== id)
            : [...prev, id]
        );
      };

      const handlePublish = (item) => {
        const newLesson = {
          id: lessons.length + 1,
          title: item.title,
          category: item.category,
          level: item.level,
          free: !item.premium,
          tags: ["new", "admin"],
          type: "lesson",
          description:
            item.text.slice(0, 120) + (item.text.length > 120 ? "..." : ""),
        };
        setLessons((prev) => [newLesson, ...prev]);
        setPublishedContent((prev) => [item, ...prev]);
      };

      return (
        <>
          <RetroBackground />
          <NavBar
            user={user}
            onLogin={login}
            onLogout={logout}
            onScrollToSection={handleScrollToSection}
          />
          <main className="min-h-screen">
            <Hero user={user} onScrollToSection={handleScrollToSection} />
            <CurriculumSection
              lessons={lessons}
              search={search}
              category={category}
              level={level}
              onSearch={setSearch}
              onCategory={setCategory}
              onLevel={setLevel}
              bookmarks={bookmarks}
              toggleBookmark={toggleBookmark}
            />
            <InteractiveLab />
            <Pricing />
            <Dashboard
              user={user}
              publishedContent={publishedContent}
              onPublish={handlePublish}
            />
          </main>
          <footer className="border-t border-slate-800/80 py-4">
            <div className="mx-auto max-w-6xl px-4 flex flex-col md:flex-row md:items-center md:justify-between gap-2 text-[11px] text-slate-500">
              <span>
                MeducateMe • Retro physiology & paediatrics teaching platform.
              </span>
              <span>
                Built for doctors, medical students, and nurses who ask “why?”
                before “what next?”.
              </span>
            </div>
          </footer>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
